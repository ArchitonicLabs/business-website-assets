<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ArchitonicLabs/business-website-assets@v1.0/css/contact-form.css">

<section class="form-container">
    <form action="https://business-website-contact-form.architonic.workers.dev"
      method="POST" class="form-with-recaptcha advertising-form"
      novalidate>
      <div class="flex-row">
        <!-- First Name -->
        <div class="input-container">
          <label for="name">First Name</label>
          <div class="input-wrapper">
            <input id="name" maxlength="80" name="first_name" size="20" type="text" placeholder="First name" required/>
          </div>
          <p class="error-message">
            First name is required
          </p>
        </div>
        <!-- Last Name -->
        <div class="input-container">
          <label for="last_name">Last Name</label>
          <div class="input-wrapper">
            <input id="last_name" maxlength="80" name="last_name" size="20" type="text" placeholder="Last name" required/>
          </div>
          <p class="error-message">
            Last name is required
          </p>
        </div>
      </div>
      <!-- Business Email -->
      <div class="input-container">
        <label for="email">Business Email</label>
        <div class="input-wrapper show-icon">
          <span class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
              <path d="M21.0015 9.25C18.4942 11.1337 15.3775 12.25 12 12.25C8.62252 12.25 5.50577 11.1337 2.99854 9.25M2.75 4.75H21.25V19.25H2.75V4.75Z" stroke="#1B1915" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <input type="email" name="email" id="email" placeholder="Business Email" required />
          <p class="error-message">
            Please enter a valid email address.
          </p>
        </div>
      </div>
      <!-- Company Name -->
      <div class="input-container">
        <label for="company">Company Name</label>
        <div class="input-wrapper show-icon">
          <span class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
              <path d="M3.75 19.25H14.25M3.75 19.25V4.75C3.75 4.19772 4.19772 3.75 4.75 3.75H13.25C13.8023 3.75 14.25 4.19772 14.25 4.75V8M3.75 19.25H1.75M14.25 19.25V8M14.25 19.25H20.25M14.25 8H19.25C19.8023 8 20.25 8.44772 20.25 9V19.25M20.25 19.25H22.25M10.25 8.75H7.75M7.75 12.75H10.25" stroke="#1B1915" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <input id="company" maxlength="40" name="company" size="20" type="text" placeholder="Company name" required/>
          <p class="error-message">
            Company name is required
          </p>
        </div>
      </div>
      <div class="flex-row">
        <!-- Job Title -->
        <div class="input-container">
          <label for="job_title">Job Title</label>
          <div class="input-wrapper">
            <input id="job_title" maxlength="80" name="00NVj0000040EiD" size="20" type="text" placeholder="Job Title" required/>
          </div>
          <p class="error-message">
            Job title is required
          </p>
        </div>
        <!-- Country -->
        <div class="input-container">
          <label for="country_code">Country</label>
          <div class="input-wrapper">
            <select id="country_code" name="country_code" class="js-countries">
              <option value="">Select Country</option>
            </select>
          </div>
          <p class="error-message">
           Country is required
          </p>
        </div>
      </div>
      <!-- Phone Number -->
      <div class="input-container">
        <label for="phone">Phone Number</label>
        <div class="input-wrapper show-icon">
          <span class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
              <path d="M9.75 19.25H14.25M6.75 22.25H17.25C17.8023 22.25 18.25 21.8023 18.25 21.25V2.75C18.25 2.19772 17.8023 1.75 17.25 1.75H6.75C6.19772 1.75 5.75 2.19772 5.75 2.75V21.25C5.75 21.8023 6.19772 22.25 6.75 22.25Z" stroke="#1B1915" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <input id="phone" maxlength="40" name="phone" size="20" type="phone" placeholder="Phone Number" required/>
        </div>
        <p class="error-message">
          Phone number is required
        </p>
      </div>
      <!-- Business Type -->
      <div class="input-container">
        <label for="branch">Business Type</label>
        <div class="input-wrapper">
          <select id="branch" name="branch">
            <option value="" disabled selected>Select Business Type</option>
            <option value="manufacturer">Manufacturer</option>
            <option value="contractor">Contractor</option>
            <option value="retailer">Retailer</option>
            <option value="agent">Agent</option>
            <option value="marketing_media">Marketing / Media / PR Agency</option>
            <option value="technology">Software &amp; Technology</option>
            <option value="education">University / Education</option>
            <option value="architect_designer">Designer / Architect</option>
            <option value="organizations">Organizations</option>
            <option value="other">Other</option>
          </select>
					<span class="chevron-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 16" fill="none">
              <path d="M8 10L12 14L16 10" stroke="#6E6861" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </div>
        <p class="error-message">
          Business type is required
        </p>
      </div>
      <!-- Message -->
      <div class="input-container">
        <label for="message">Message</label>
        <div class="textarea-wrapper">
          <textarea id="message" name="00N6N000000moUR" class="textarea-styled" placeholder="Message here"></textarea>
          <p class="error-message">
            Message is required
          </p>
        </div>
      </div>
      <!-- Privacy Policy -->
        <div class="input">
          <div class="afd-checkbox privacy-policy-input">
            <input name="advertising[privacy_policy]" type="hidden" value="0">
            <input id="privacy-policy" class="afd-checkbox__input" type="checkbox" value="1"
              name="advertising[privacy_policy]">
            <label for="privacy-policy" class="afd-checkbox__label">I agree to the <a target="blank"
                href="https://www.architonic.com/en/terms-of-use">Terms of use</a> and the <a target="blank"
                href="https://www.architonic.com/en/privacy-policy">Privacy Policy</a></label>
          </div>
        </div>
  
        <div style="display:none;">
          <label for="website">Website</label>
          <input id="website" name="website" type="text" tabindex="-1" autocomplete="off" />
        </div>
  
  			<div style="margin-top:20px;">
          <div class="cf-turnstile" data-sitekey="0x4AAAAAACrRN6O88yEWSutr"></div>
        </div>
  
      <!-- Submit -->
      <div class="button-container">
        <input id="advertising-submit" type="submit" class="at-primary-button" value="Send your request"
          disabled="disabled">
      </div>
    </form>
  </section>
